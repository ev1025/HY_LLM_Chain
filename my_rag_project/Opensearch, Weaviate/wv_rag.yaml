name: KGS Weaviate RAG - CI/CD to AWS EC2

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: rag/kgs-weaviate  # 1. 새 ECR 리포지토리 이름(미리 생성해둬야함)
  CONTAINER_NAME: rag-wv-container  # 2. 새 컨테이너 이름

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_fixed: ${{ steps.build-image.outputs.image_fixed }}
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG_FIXED: weaviate_latest # 3. 새 이미지 태그
      run: |
        # 4. 새 Dockerfile(wv_rag_dock)을 사용하도록 경로 수정
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_FIXED -f dockerfile/wv_rag_dock .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_FIXED
        echo "image_fixed=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_FIXED" >> $GITHUB_OUTPUT

    - name: Clean Docker cache # 로컬 이미지 삭제
      run: |
        docker system prune -af --volumes || true
        docker builder prune -af || true

  deploy-to-ec2:
      name: Deploy to EC2
      needs: build-and-push
      runs-on: ubuntu-latest

      steps:
      - name: Deploy to EC2 instance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e # 오류 발생 시 즉시 중단

            # ECR 로그인
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ needs.build-and-push.outputs.registry }}

            # 기존 컨테이너 중지 및 삭제 (새로운 CONTAINER_NAME 사용)
            sudo docker stop ${{ env.CONTAINER_NAME }} || true
            sudo docker rm   ${{ env.CONTAINER_NAME }} || true

            # 새 컨테이너 실행
            # 5. 외부 포트를 변경하여 기존 서비스와 충돌 방지(-p 외부포트:내부포트)
            sudo docker run --pull=always -d --name ${{ env.CONTAINER_NAME }} -p 8002:8000 --restart always \
              --log-driver=json-file --log-opt max-size=50m --log-opt max-file=3 \
              -e OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
              -e COHERE_API_KEY='${{ secrets.COHERE_API_KEY }}' \
              -e LANGCHAIN_TRACING_V2='true' \
              -e LANGCHAIN_API_KEY='${{ secrets.LANGCHAIN_API_KEY }}' \
              -e LANGCHAIN_PROJECT='${{ secrets.LANGCHAIN_PROJECT }}' \
              -e DB_HOST='${{ secrets.DB_HOST }}' \
              -e DB_USER='${{ secrets.DB_USER }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e DB_PORT='${{ secrets.DB_PORT }}' \
              -e DB_NAME='${{ secrets.DB_NAME }}' \
              -e WEAVIATE_URL='${{ secrets.WEAVIATE_URL }}' \
              -e WEAVIATE_API_KEY='${{ secrets.WEAVIATE_API_KEY }}' \
              -e WEAVIATE_OPENAI_KEY='${{ secrets.WEAVIATE_OPENAI_KEY }}' \
              -e GCP_API_KEY='${{ secrets.GCP_API_KEY }}' \
              ${{ needs.build-and-push.outputs.image_fixed }}

            # 사용하지 않는 dangling 이미지 최종 정리
            sudo docker container prune -f || true
            sudo docker image prune -af || true

            echo "Deployment successful!"